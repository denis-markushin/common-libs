name: Release

on:
  workflow_dispatch:
    inputs:
      releaseType:
        description: 'Release type'
        required: true
        type: choice
        options:
          - PATCH
          - MINOR
          - MAJOR
        default: MINOR

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  make-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate branch for release type
        shell: bash
        env:
          BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TYPE: ${{ inputs.releaseType }}
        run: |
          case "$TYPE" in
            MAJOR|MINOR)
              if [ "$BRANCH" != "$DEFAULT_BRANCH" ]; then
                echo "::error::$TYPE release must be run from '$DEFAULT_BRANCH', got '$BRANCH'"
                exit 1
              fi
              ;;
            PATCH)
              if [[ "$BRANCH" != release/* ]]; then
                echo "::error::PATCH release must be run from a 'release/*' branch, got '$BRANCH'"
                exit 1
              fi
              ;;
            *)
              echo "::error::Unknown release type '$TYPE'"
              exit 1
              ;;
          esac

      - name: Validate RELEASE_TOKEN is set
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::error::RELEASE_TOKEN secret is not set. Create a PAT with 'contents: write' and add it as the RELEASE_TOKEN repository secret."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make release
        env:
          RELEASE_TYPE: ${{ inputs.releaseType }}
        run: ./gradlew makeRelease -PreleaseType="$RELEASE_TYPE"
